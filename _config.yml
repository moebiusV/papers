# GitHub Pages / Jekyll configuration
permalink: pretty

# Only process content directories — skip build artifacts and tooling
exclude:
  - dist
  - build
  - private
  - Makefile
  - COPYING
  - AUTHORS
  - NEWS
  - ChangeLog
  - INSTALL
  # entfesselt .md files are not for web rendering (HTML files are the distribution format)
  - papers/entfesselt/dialogue-barcelona.md
  - papers/entfesselt/dialogue-mozeson.md
  - papers/entfesselt/entfesselt-column.md
  - papers/entfesselt/entfesselt-spec-english.md
  - papers/entfesselt/entfesselt-state.md
  - papers/entfesselt/kafka-verwandlung.md
  - papers/entfesselt/kleist-erdbeben.md
  - papers/entfesselt/marx-manifest.md
